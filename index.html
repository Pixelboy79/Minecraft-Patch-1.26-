<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pixelboy Analytics Pro v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#081224;color:#fff;font-family:Arial,sans-serif}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#12203d;border-radius:18px;padding:18px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
h1{margin:0}
button{padding:12px 18px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.primary{background:#4da3ff}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#1f3d73}
canvas{background:#fff;border-radius:12px;padding:10px;margin-top:10px}
.small{opacity:.8}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1> Pixelboy Patch Analytics Pro v2</h1>
<p class="small">Manual refresh + local cache</p>
<button class="primary" onclick="refreshStats()">🔄 Refresh Stats</button>
<p id="status">Loading cached data...</p>
<p id="updated"></p>
</div>

<div class="grid">
<div class="card"><h3>Total Downloads</h3><h2 id="downloads">-</h2></div>
<div class="card"><h3>Total Releases</h3><h2 id="releases">-</h2></div>
<div class="card"><h3>Total Assets</h3><h2 id="assets">-</h2></div>
<div class="card"><h3>Top Release</h3><h2 id="top">-</h2></div>
</div>

<div class="card"><canvas id="releaseChart"></canvas></div>
<div class="card"><canvas id="archChart"></canvas></div>
</div>

<script>
const API='https://api.github.com/repos/Pixelboy79/Minecraft-Patch-1.26-/releases';
let releaseChart,archChart;

function render(data){
 let total=0, assets=0, arm64=0, arm32=0;
 let releaseData=[];
 let topName='-', topCount=0;

 data.forEach(r=>{
   let relTotal=0;
   r.assets.forEach(a=>{
      total+=a.download_count;
      assets++;
      relTotal+=a.download_count;

      const n=a.name.toLowerCase();
      if(n.includes('arm64')) arm64+=a.download_count;
      if(n.includes('arm32')) arm32+=a.download_count;
   });

   releaseData.push({name:r.name,downloads:relTotal});

   if(relTotal>topCount){
      topCount=relTotal;
      topName=r.name;
   }
 });

 document.getElementById('downloads').textContent=total.toLocaleString();
 document.getElementById('releases').textContent=data.length;
 document.getElementById('assets').textContent=assets;
 document.getElementById('top').textContent=topName;

 if(releaseChart) releaseChart.destroy();
 releaseChart=new Chart(document.getElementById('releaseChart'),{
   type:'bar',
   data:{
      labels:releaseData.map(x=>x.name),
      datasets:[{label:'Downloads',data:releaseData.map(x=>x.downloads)}]
   }
 });

 if(archChart) archChart.destroy();
 archChart=new Chart(document.getElementById('archChart'),{
   type:'pie',
   data:{
      labels:['Arm64','Arm32'],
      datasets:[{data:[arm64,arm32]}]
   }
 });
}

async function refreshStats(){
 try{
   document.getElementById('status').textContent='Fetching from GitHub...';
   const data=await fetch(API).then(r=>r.json());

   if(data.message){
      throw new Error(data.message);
   }

   localStorage.setItem('pixelboy_cache',JSON.stringify(data));
   localStorage.setItem('pixelboy_updated',new Date().toLocaleString());

   render(data);

   document.getElementById('status').textContent='✅ Live data loaded';
   document.getElementById('updated').textContent='Last Updated: '+localStorage.getItem('pixelboy_updated');

 }catch(e){
   document.getElementById('status').textContent='⚠️ Using cached data';
   loadCache();
 }
}

function loadCache(){
 const cache=localStorage.getItem('pixelboy_cache');

 if(cache){
   render(JSON.parse(cache));
   document.getElementById('updated').textContent='Last Updated: '+(localStorage.getItem('pixelboy_updated')||'Unknown');
 }else{
   document.getElementById('status').textContent='No cached data yet. Press Refresh Stats.';
 }
}

loadCache();
</script>
</body>
</html>
